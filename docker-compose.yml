services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: salon_dev
      POSTGRES_USER: salon
      POSTGRES_PASSWORD: salon
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U salon -d salon_dev" ]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  pgdata:
