services:
  db:
    image: postgres:17-alpine
    container_name: salon-db
    env_file:
      - .env
    environment:
      POSTGRES_DB: salon_prod
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d salon_prod" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - salon-network

  salon-back:
    image: ghcr.io/elksandro2/sass-salon/salon-back:latest
    container_name: salon-back
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: always
    networks:
      - salon-network

  salon-front:
    image: ghcr.io/elksandro2/sass-salon/salon-front:latest
    container_name: salon-front
    env_file:
      - .env
    depends_on:
      - salon-back
    restart: always
    networks:
      - salon-network

volumes:
  pgdata:

networks:
  salon-network:
    external: true
