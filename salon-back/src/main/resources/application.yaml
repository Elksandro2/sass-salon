spring:
  application:
    name: salon
  profiles:
    active: dev
  output:
    ansi:
      enabled: always
  
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          ssl:
            enable: ${MAIL_PROPERTIES_MAIL_SMTP_SSL_ENABLE:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:false}

mail:
  from: ${MAIL_FROM:dev@localhost.com}
  business: ${MAIL_BUSINESS:salao@localhost.com}

logging:
  level:
    root: INFO
    com.cristiane.salon: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/salon.log
    max-size: 10MB
    max-history: 10
